name: Create Module Files For GitHub Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
  
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for Version Bump
        id: check_bump
        run: |
          VERSION=$(jq -r .version module.json)
          if git show-ref --tags "refs/tags/v$VERSION" --quiet; then
            echo "Tag v$VERSION already exists. Skipping release."
            echo "is_bump=false" >> $GITHUB_OUTPUT
          else
            echo "New version detected: v$VERSION"
            echo "is_bump=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Generate Release Notes
        if: steps.check_bump.outputs.is_bump == 'true'
        id: generate_notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log HEAD^ --pretty=format:"- %s")
          else
            NOTES=$(git log ${PREV_TAG}..HEAD^ --pretty=format:"- %s")
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Set up Node.js
        if: steps.check_bump.outputs.is_bump == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Modify Module Manifest With Release-Specific Values
        if: steps.check_bump.outputs.is_bump == 'true'
        id: sub_manifest_link_version
        uses: microsoft/variable-substitution@v1
        with:
          files: 'module.json'
        env:
          version: ${{ steps.check_bump.outputs.version }}
          url: https://github.com/${{github.repository}}
          manifest: https://github.com/${{github.repository}}/releases/latest/download/module.json
          download: https://github.com/${{github.repository}}/releases/download/v${{ steps.check_bump.outputs.version }}/module.zip

      - name: Zip Files
        if: steps.check_bump.outputs.is_bump == 'true'
        run: zip -r ./module.zip module.json README.md languages/ scripts/ -x "packs/_source/*"

      - name: Verify Release Files
        if: steps.check_bump.outputs.is_bump == 'true'
        run: ls -lah ./module.json ./module.zip

      - name: Update Release with Files
        if: steps.check_bump.outputs.is_bump == 'true'
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: "v${{ steps.check_bump.outputs.version }}"
          tag: "v${{ steps.check_bump.outputs.version }}"
          body: ${{ steps.generate_notes.outputs.notes }}
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: './module.json,./module.zip'
